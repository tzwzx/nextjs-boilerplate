check:
  - parallel:
      - bun lint
      - bun stylelint
      - bun syncpack:lint
      - bun typecheck
      - bun spellcheck
      - bun spellcheck:unused
      - bun fallow
      - bun test:unit

fix:
  - sequential:
      - bun fix
      - bun stylelint:fix
  - parallel:
      - bun syncpack:fix
      - bun typecheck
      - bun spellcheck
      - bun spellcheck:unused
      - bun fallow
      - bun test:unit
