name: Lint

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Run Oxlint and Oxfmt
        run: bun lint

      - name: Run typecheck
        run: bun typecheck

      - name: Run Stylelint
        run: bun stylelint

      - name: Run syncpack:lint
        run: bun syncpack:lint

      - name: Run fallow
        run: bun fallow

      - name: Run spellcheck
        run: bun spellcheck

      - name: Check unused cspell words
        run: bun spellcheck:unused
